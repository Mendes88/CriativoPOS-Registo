name: Build Criativo Registo APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/criativo-pos.keystore \
            -Pandroid.injected.signing.store.password=Criativo2024! \
            -Pandroid.injected.signing.key.alias=criativo-pos \
            -Pandroid.injected.signing.key.password=Criativo2024! \
            --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: CriativoRegisto-Release
          path: "**/*-release.apk"
